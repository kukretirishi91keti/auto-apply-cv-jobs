# Auto-Apply CV Jobs Configuration

search:
  keywords:
    # Search terms (also used for keyword scoring)
    - "VP Marketing, Head of Marketing, Marketing Head"
    - "VP Brand, Head of Brand, Brand Head, Brand Director"
    - "VP Digital, Head of Digital Marketing, Digital Head"
    - "VP Growth, Head of Growth, Growth Director"
    - "CMO, Chief Marketing Officer"
    - "Director Marketing, Director Brand, Director Digital"
    # Domain/sector scoring keywords (not used as search queries)
    - "BFSI Marketing, Insurance Marketing, FinTech Marketing"
    - "Performance Marketing, Growth Marketing, Demand Generation"
    - "Product Marketing, Platform Marketing"
    - "Marketing Transformation, Digital Transformation"
  locations:
    - "Bangalore"
    - "Mumbai"
    - "Delhi NCR"
    - "Hyderabad"
    - "Remote"
  experience_years: 10
  seniority_levels:
    - "senior"
    - "director"
    - "vp"
  min_salary: 0
  excluded_companies:
    - "example-spam-company"
  excluded_title_patterns:
    - "Senior Manager"
    - "Associate Director"
    - "Assistant Manager"
    - "Executive"
    - "Trainee"
    - "Intern"

cvs:
  directory: "data/cvs"
  versions:
    - name: "brand_bfsi"
      file: "CV_Talentfit.in.pdf"
      description: "Brand development, BFSI marketing, celebrity partnerships, insurance"
    - name: "growth_digital"
      file: "CV_Prime_Video_&_Amazon_MGM_Studios.pdf"
      description: "Growth leadership, digital marketing, user acquisition, content strategy"
    - name: "general"
      file: "Rishi Kukreti CV.pdf"
      description: "General marketing, product management, business strategy"

matching:
  keyword_min_score: 0.3
  ai_min_score: 0.7
  ai_model: "claude-sonnet-4-20250514"
  max_ai_scorings_per_day: 500
  api_budget_usd: 5.00

apply:
  max_applications_per_day: 30
  max_per_portal: 10
  generate_cover_letter: true
  save_screenshots: true

portals:
  naukri:
    enabled: true
    auto_apply: true
  indeed:
    enabled: true
    auto_apply: true
  foundit:
    enabled: true
    auto_apply: true
  ziprecruiter:
    enabled: true
    auto_apply: true
  linkedin:
    enabled: true
    auto_apply: false
  glassdoor:
    enabled: true
    auto_apply: false
  adzuna:
    enabled: true
    auto_apply: false          # Adzuna is scrape + score; apply via direct link
    app_id: "78c0615d"
    app_key: "2d44055e8669bad64cdff1d44023254c"
    country: "in"              # India
    results_per_page: 50
    max_pages: 5               # 50 x 5 = 250 jobs per search term

schedule:
  enabled: false
  cron_hour: 9
  cron_minute: 0
  timezone: "Asia/Kolkata"

browser:
  headless: true
  slow_mo: 100
  timeout: 30000
  state_dir: "browser_state"

notifications:
  email:
    enabled: false
  slack:
    enabled: false
