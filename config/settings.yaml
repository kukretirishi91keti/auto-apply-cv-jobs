# Auto-Apply CV Jobs Configuration

# Job search preferences
search:
  keywords:
    # First 10 terms (after comma-split) are used for LinkedIn/API searches
    # Ordered by volume + relevance — replace weak terms with your actual target titles
    - "AVP Marketing, VP Marketing, Marketing Head"
    - "Head of Marketing, Director Marketing, CMO"
    - "Head of Brand, VP Brand, Brand Head"
    - "Head of Digital Marketing, Digital Marketing Head"
    # Below are used for keyword scoring (matching) but not portal search
    - "BFSI Marketing, Insurance Marketing, FinTech Marketing"
    - "Performance Marketing Lead, Growth Marketing Head"
  locations:
    - "Bangalore"
    - "Mumbai"
    - "Delhi NCR"
    - "Hyderabad"
    - "Remote"
  experience_years: 10
  seniority_levels:
    - "senior"       # Senior level (5-8 yrs)
    - "director"     # Director level (8-12 yrs)
    - "vp"           # VP level (10-15 yrs)
  min_salary: 0          # 0 = no minimum
  excluded_companies:
    - "example-spam-company"
  # Job titles containing any of these phrases are skipped BEFORE AI scoring (saves quota)
  excluded_title_patterns:
    - "Senior Manager"
    - "Associate Director"
    - "Assistant Manager"
    - "Executive"
    - "Trainee"
    - "Intern"

# CV configuration
cvs:
  # Path relative to project root
  directory: "data/cvs"
  versions:
    - name: "brand_bfsi"
      file: "CV_Talentfit.in.pdf"
      description: "Brand development, BFSI marketing, celebrity partnerships, insurance"
    - name: "growth_digital"
      file: "CV_Prime_Video_&_Amazon_MGM_Studios.pdf"
      description: "Growth leadership, digital marketing, user acquisition, content strategy"
    - name: "general"
      file: "Rishi Kukreti CV.pdf"
      description: "General marketing, product management, business strategy"

# Matching configuration
matching:
  # Stage 1: keyword filter (free, fast)
  keyword_min_score: 0.3       # 0-1, minimum keyword overlap to pass to stage 2
  # Stage 2: Claude AI scoring (paid, smart)
  ai_min_score: 0.7            # 0-1, minimum AI score to auto-apply
  ai_model: "claude-sonnet-4-20250514"
  max_ai_scorings_per_day: 500
  api_budget_usd: 5.00         # hard-stop daily Claude API spend

# Application settings
apply:
  max_applications_per_day: 30
  max_per_portal: 10
  generate_cover_letter: true
  save_screenshots: true       # screenshot after each apply for verification

# Portal settings
portals:
  naukri:
    enabled: true
    auto_apply: true
  indeed:
    enabled: true
    auto_apply: true
  foundit:
    enabled: true
    auto_apply: true
  ziprecruiter:
    enabled: true
    auto_apply: true
  linkedin:
    enabled: true
    auto_apply: false          # scrape-only (aggressive bot detection)
  glassdoor:
    enabled: true
    auto_apply: false          # scrape-only

# Scheduling
schedule:
  enabled: false
  cron_hour: 9
  cron_minute: 0
  timezone: "Asia/Kolkata"

# Browser settings
browser:
  headless: true
  slow_mo: 100                 # ms between actions
  timeout: 30000               # ms page load timeout
  state_dir: "browser_state"   # persistent session storage

# Notifications
notifications:
  email:
    enabled: false
  slack:
    enabled: false
